name: Build and publish Docker image

# Builds the manager image and pushes it to GitHub Container Registry (GHCR).
# Two channels, same audit + Trivy gates:
#   * STABLE — pushing a vX.Y.Z tag publishes `latest`, the semver tags
#     (vX.Y.Z + vX.Y), and a short-sha tag. This is what Community Applications
#     users track; it only moves when a release is cut.
#   * NIGHTLY — every push to `main` publishes `nightly` (bleeding edge) plus a
#     short-sha tag. Point a box at `:nightly` to ride ahead of stable without
#     affecting `:latest` users. Nightly NEVER moves `latest` or the semver tags.
# The short-sha tag on both channels is an immutable rollback pin.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Audit production dependencies (fail on high+)
        run: pnpm audit --prod --audit-level high

  build-and-push:
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercase image name (GHCR requires lowercase); links to this repo.
          images: ghcr.io/shakes63/palisade
          # `latest` is gated to tag refs so a push to main can never move it;
          # `nightly` is gated to main. The `type=semver` lines only emit on a
          # semver tag ref, so they're inert on branch pushes.
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=sha,format=short

      - name: Build (amd64 — Unraid), load for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: ghcr.io/shakes63/palisade:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (block on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/shakes63/palisade:scan
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push (reuses the scanned build from cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
